[program:pos-queue-worker]
process_name=%(program_name)s_%(process_num)02d
directory=/var/www/pos/current
command=php artisan queue:work redis --sleep=1 --tries=3 --timeout=120 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/pos/current/storage/logs/supervisor-queue-worker.log
stopwaitsecs=3600